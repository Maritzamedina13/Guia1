<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prácticas Profesionales ITM · Sistema de Guías</title>
<style>
  :root {
    --azul:     #102D69;
    --azul-m:   #1A3F8F;
    --azul-l:   #E8EDF5;
    --azul-xl:  #F2F5FB;
    --acento:   #5B8DD9;
    --blanco:   #FFFFFF;
    --negro:    #1A1A1A;
    --gris-l:   #F4F6F9;
    --gris-m:   #C5CDD8;
    --gris-t:   #6B7A8D;
    --exc:      #1B5E20;
    --shadow:   0 2px 12px rgba(16,45,105,.13);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background: var(--azul-xl); color: var(--negro); }

  /* ══ LAYOUT ══════════════════════════════════════════════════════ */
  .shell { display: flex; flex-direction: column; height: 100vh; }

  /* ── Top bar ─────────────────────────────────────────────────── */
  .topbar {
    background: var(--azul);
    color: #fff;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
    height: 58px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
    z-index: 10;
  }
  .topbar img { height: 36px; width: auto; filter: brightness(0) invert(1); opacity: .92; }
  .topbar-sep { width: 1px; height: 32px; background: rgba(255,255,255,.25); }
  .topbar-titles { flex: 1; }
  .topbar-titles .t1 { font-size: 11pt; font-weight: 700; letter-spacing: .3px; }
  .topbar-titles .t2 { font-size: 7.5pt; opacity: .75; margin-top: 1px; }
  .topbar-badge {
    background: var(--acento); color: var(--azul);
    font-size: 7pt; font-weight: 800; padding: 3px 10px;
    border-radius: 12px; letter-spacing: .5px; white-space: nowrap;
  }

  /* ── Tab nav ─────────────────────────────────────────────────── */
  .tabnav {
    background: var(--azul-m);
    display: flex;
    gap: 3px;
    padding: 0 16px;
    flex-shrink: 0;
    border-bottom: 3px solid var(--acento);
  }
  .tab-btn {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 10px 18px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,.65);
    font-family: inherit;
    font-size: 8.5pt;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -3px;
    transition: all .18s;
    letter-spacing: .2px;
    white-space: nowrap;
  }
  .tab-btn:hover { color: #fff; background: rgba(255,255,255,.08); }
  .tab-btn.active {
    color: #fff;
    border-bottom-color: var(--acento);
    background: rgba(255,255,255,.10);
  }
  .tab-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px; height: 22px;
    border-radius: 50%;
    font-size: 8pt;
    font-weight: 800;
    background: rgba(255,255,255,.15);
    color: rgba(255,255,255,.8);
    flex-shrink: 0;
    transition: all .18s;
  }
  .tab-btn.active .tab-num {
    background: var(--acento);
    color: #fff;
  }
  .tab-code {
    font-size: 6.5pt;
    opacity: .6;
    font-weight: 400;
    display: block;
    margin-top: 1px;
  }

  /* ── Contenido principal ─────────────────────────────────────── */
  .main { flex: 1; display: flex; overflow: hidden; }

  /* ── Panel info lateral ──────────────────────────────────────── */
  .sidebar {
    width: 230px;
    background: var(--blanco);
    border-right: 1px solid #DDE3EE;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar-hdr {
    background: var(--azul-l);
    padding: 12px 14px 8px;
    border-bottom: 1px solid #DDE3EE;
  }
  .sidebar-hdr h3 { font-size: 8pt; color: var(--azul); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
  .guide-info { padding: 14px; }
  .guide-info .gi-title {
    font-size: 10pt; font-weight: 700; color: var(--azul); margin-bottom: 4px; line-height: 1.3;
  }
  .guide-info .gi-code {
    display: inline-block; background: var(--azul); color: #fff;
    font-size: 7pt; font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-bottom: 8px;
  }
  .guide-info p { font-size: 8pt; color: var(--gris-t); line-height: 1.55; }
  .guide-info .gi-moment {
    margin-top: 10px; padding: 6px 10px; background: var(--azul-l);
    border-left: 3px solid var(--azul); border-radius: 0 4px 4px 0;
    font-size: 7.5pt; color: var(--azul); font-weight: 600;
  }
  .guide-info .gi-sections { margin-top: 12px; }
  .guide-info .gi-sections h4 { font-size: 7.5pt; color: var(--gris-t); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
  .sec-chip {
    display: inline-block; background: var(--azul-l); color: var(--azul);
    font-size: 7pt; font-weight: 600; padding: 2px 8px; border-radius: 10px;
    margin: 2px 2px 0 0; border: 1px solid #C8D5EA;
  }
  .sidebar-actions { padding: 0 14px 14px; margin-top: auto; }
  .btn-open {
    display: block; width: 100%; padding: 9px;
    background: var(--azul); color: #fff; border: none;
    border-radius: 6px; font-family: inherit; font-size: 8.5pt;
    font-weight: 700; cursor: pointer; text-align: center;
    text-decoration: none; transition: background .15s;
  }
  .btn-open:hover { background: #0b2050; }

  /* ── Marco iframe ────────────────────────────────────────────── */
  .iframe-wrap {
    flex: 1;
    background: #8a9ab5;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  iframe {
    flex: 1;
    border: none;
    width: 100%;
  }

  /* ══ RESPONSIVE ══ */
  @media (max-width: 900px) {
    .sidebar { width: 180px; }
    .tab-btn { padding: 10px 12px; font-size: 7.5pt; }
  }
</style>
</head>
<body>
<div class="shell">

  <!-- ── TOP BAR ────────────────────────────────────────────────── -->
  <div class="topbar">
    <img src="Imagenes/LOGO ITM.png" alt="ITM">
    <div class="topbar-sep"></div>
    <div class="topbar-titles">
      <div class="t1">Guías de Seguimiento Prácticas Profesionales ITM</div>
    </div>
  </div>

  <!-- ── TAB NAV ─────────────────────────────────────────────────── -->
  <div class="tabnav">
    <button class="tab-btn active" onclick="cambiarGuia(0)" id="tab0">
      <span class="tab-num">1</span>
      <span>
        Visita de Inicio
        <span class="tab-code">FDE-074</span>
      </span>
    </button>
    <button class="tab-btn" onclick="cambiarGuia(1)" id="tab1">
      <span class="tab-num">2</span>
      <span>
        Seguimiento
        <span class="tab-code">FDE-075</span>
      </span>
    </button>
    <button class="tab-btn" onclick="cambiarGuia(2)" id="tab2">
      <span class="tab-num">3</span>
      <span>
        Evaluación del Practicante
        <span class="tab-code">FDE-076</span>
      </span>
    </button>
    <button class="tab-btn" onclick="cambiarGuia(3)" id="tab3">
      <span class="tab-num">4</span>
      <span>
        Acta de Cierre
        <span class="tab-code">FDE-077</span>
      </span>
    </button>
  </div>

  <!-- ── MAIN ───────────────────────────────────────────────────── -->
  <div class="main">

    <!-- Sidebar info -->
    <div class="sidebar">
      <div class="sidebar-hdr"><h3>Información del formato</h3></div>
      <div class="guide-info" id="sidebar-content">
        <!-- Relleno por JS -->
      </div>
      <div class="sidebar-actions">
        <a class="btn-open" id="btn-abrir" href="index.html" target="_blank">⬡ Abrir en nueva ventana</a>
      </div>
    </div>

    <!-- Iframe viewer -->
    <div class="iframe-wrap">
      <iframe id="visor" src="index.html" title="Visor de guía"></iframe>
    </div>

  </div>
</div>

<script>
const GUIAS = [
  {
    archivo:  'index.html',
    titulo:   'Guía N°1 – Visita de Inicio',
    codigo:   'FDE-074',
    momento:  'Aplicar al inicio de la práctica (días 1–15)',
    objetivo: 'Registrar las condiciones iniciales de la práctica profesional, el plan de trabajo acordado y los compromisos entre el practicante, la empresa y el Monitor ITM.',
    secciones: ['Identificación','Plan de trabajo','Compromisos','Foto','Firmas (3)'],
  },
  {
    archivo:  'guia2.html',
    titulo:   'Guía N°2 – Seguimiento',
    codigo:   'FDE-075',
    momento:  'Aplicar a los 30 días de iniciada la práctica',
    objetivo: 'Realizar el seguimiento del proceso de práctica, evaluar el desempeño del practicante en 12 criterios de competencia y registrar observaciones de acompañamiento.',
    secciones: ['Identificación','Escala E/S/P/M','12 criterios (4 bloques)','Acompañamiento','Foto','Firma Monitor'],
  },
  {
    archivo:  'guia3.html',
    titulo:   'Guía N°3 – Evaluación del Practicante',
    codigo:   'FDE-076',
    momento:  'Aplicar a los 60 días de iniciada la práctica',
    objetivo: 'Recoger la perspectiva del practicante sobre su experiencia, valorar el aporte de la práctica a su desarrollo profesional y verificar las condiciones del escenario.',
    secciones: ['Identificación','6 criterios de aporte','Verificación condiciones','Comentarios','Indicadores de contexto','Foto','Firma Monitor'],
  },
  {
    archivo:  'guia4.html',
    titulo:   'Guía N°4 – Acta de Cierre',
    codigo:   'FDE-077',
    momento:  'Aplicar al finalizar la práctica profesional',
    objetivo: 'Formalizar el cierre de la práctica, evaluar las competencias finales del practicante, registrar apreciaciones de empresa y estudiante, y consignar las calificaciones finales.',
    secciones: ['Identificación','12 competencias (4 bloques)','Nota empresa','Apreciaciones y recomendaciones','Conclusiones Monitor','Perspectiva continuidad','Foto','Firmas (3)'],
  },
];

let guiaActual = 0;

function cambiarGuia(idx) {
  guiaActual = idx;
  const g = GUIAS[idx];

  // tabs
  document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', i === idx));

  // iframe
  const iframe = document.getElementById('visor');
  iframe.src = g.archivo;

  // sidebar
  document.getElementById('btn-abrir').href = g.archivo;
  document.getElementById('sidebar-content').innerHTML = `
    <div class="gi-title">${g.titulo}</div>
    <span class="gi-code">${g.codigo}</span>
    <p>${g.objetivo}</p>
    <div class="gi-moment">⏱ ${g.momento}</div>
    <div class="gi-sections">
      <h4>Secciones</h4>
      ${g.secciones.map(s => `<span class="sec-chip">${s}</span>`).join('')}
    </div>
  `;
}

// Inicializar
cambiarGuia(0);
</script>
</body>
</html>
